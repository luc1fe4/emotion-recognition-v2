[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "npm --workspace @emotion-recognition/shared run build",
  "npm --workspace @emotion-recognition/api run build"
]

[start]
cmd = "cd apps/api && npx prisma migrate deploy && cd ../.. && node apps/api/dist/server.js"
