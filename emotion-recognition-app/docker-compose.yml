services:
  postgres:
    image: postgres:16-alpine
    container_name: emotion-recognition-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: emotion_recognition
      POSTGRES_USER: emotion_app
      POSTGRES_PASSWORD: emotion_app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emotion_app -d emotion_recognition"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: emotion-recognition-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
